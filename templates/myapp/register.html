{% extends 'base.html' %}
{% block title %}Create Your Account{% endblock %}
{% block content %} 
<h2>
    <span style="font-size: 2.5rem;">📝</span>
    Join Us! Create Your Account
</h2>
<p class="text-muted mb-4">Sign up to manage your scrap quotes and pickups with ease.</p>
<div class="row justify-content-center">    
    <div class="col-md-5">
        <div class="card shadow-sm p-4">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
        </div>
    </div>

{% endblock %}
