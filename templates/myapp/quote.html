{% extends 'base.html' %}
{% block title %}Get a Price Quote{% endblock %}
{% block content %}



    <!-- QUOTE FORM -->
    <div class="card shadow-sm p-4 mb-3">
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-bold">Your Name</label>
          <input name="name" class="form-control"
                 placeholder="e.g. Ahmed Khan"
                 value="{{ quote_result.name|default:'' }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Phone Number</label>
          <input name="phone" class="form-control"
                 placeholder="e.g. 0300-0000000"
                 value="{{ quote_result.phone|default:'' }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Scrap Type</label>
          <select name="scrap_type" class="form-select" id="scrapSelect" required>
            <option value="">-- Select your scrap type --</option>
            {% for type_val, material in scrap_types %}
            <option value="{{ type_val }}">{{ material }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Weight (kg)</label>
          <input name="weight_kg" id="weightInput" type="number"
                 step="0.5" min="1" class="form-control"
                 placeholder="e.g. 50" required>
        </div>

        <!-- Live preview before submitting -->
        <div id="preview" class="alert alert-info d-none mb-3">
          ⚡ Live estimate: <strong>PKR <span id="previewPrice">0</span></strong>
          <br><small>Submit the form to get your official quote</small>
        </div>

        <button type="submit" class="btn btn-success w-100 btn-lg">
          Get My Quote
        </button>

      </form>
    </div>

  </div>
</div>

<script>
  // Prices from database, passed by the view
  const prices = JSON.parse('{{ scrap_prices_json|escapejs }}');

  function updatePreview() {
    const type   = document.getElementById('scrapSelect').value;
    const weight = parseFloat(document.getElementById('weightInput').value) || 0;
    const price  = prices[type] || 0;
    const total  = price * weight;

    const preview      = document.getElementById('preview');
    const previewPrice = document.getElementById('previewPrice');

    if (type && weight > 0 && price > 0) {
      previewPrice.textContent = total.toLocaleString();
      preview.classList.remove('d-none');
    } else {
      preview.classList.add('d-none');
    }
  }

  document.getElementById('scrapSelect').addEventListener('change', updatePreview);
  document.getElementById('weightInput').addEventListener('input',  updatePreview);
</script>

{% endblock %}
