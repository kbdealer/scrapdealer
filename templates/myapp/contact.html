{% extends 'base.html' %}
{% block title %}Contact & Location{% endblock %}
{% block content %}
<div class="row g-4">
  <div class="col-md-5">
    <h2>Find us</h2>
    <p><strong>{{ business_name }}</strong><br>{{ address }}</p>
    <a href="tel:{{ phone }}" class="btn btn-scrap mb-2 d-block">Call {{ phone }}</a>
    <a href="https://wa.me/{{ whatsapp }}" class="btn btn-success mb-3 d-block">WhatsApp Us</a>

    <h5>Send a message</h5>
    <form method="post">
      {% csrf_token %}
      <input name="name" class="form-control mb-2" placeholder="Your name" required>
      <input name="phone" class="form-control mb-2" placeholder="Phone number" required>
      <textarea name="message" class="form-control mb-2" rows="3" placeholder="Your message"></textarea>
      <button class="btn btn-scrap w-100">Send</button>
    </form>
  </div>
  <div class="col-md-7">
    <div id="map" style="height:420px;border-radius:12px;"></div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([ 34.168144 , 72.306810 ], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap contributors'}).addTo(map);
  const marker = L.marker([ 34.168144 , 72.306810 ]);
  marker.addTo(map);
  marker.bindPopup('<b>{{ business_name }}</b><br>{{ address }}');
  marker.openPopup();
</script>
{% endblock %}
