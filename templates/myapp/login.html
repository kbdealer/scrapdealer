{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm p-4">

      <div class="text-center mb-3">
        <span class="fs-1">🔐</span>
        <h2 class="h5 fw-semibold mb-1">Welcome back</h2>
        <p class="text-muted small">Enter your credentials to access your account.</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input name="username" class="form-control" placeholder="e.g. ahmed.khan">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input name="password" type="password" class="form-control" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Log in</button>
      </form>

      <hr>
      <p class="text-center text-muted small mb-0">
        New user? <a href="{% url 'register' %}">Create an account</a>
      </p>

    </div>
  </div>
</div>

{% endblock %}
